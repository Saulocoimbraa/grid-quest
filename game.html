<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>Missão - Grid Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface-bright": "#f0f8ff",
            "on-surface": "#1e3a8a",
            "primary": "#3b82f6",
            "primary-container": "#dbeafe",
            "on-primary-container": "#1e40af",
            "secondary": "#fbbf24",
            "secondary-container": "#fef3c7",
            "surface-container": "#ffffff",
            "surface-variant": "#e0f2fe",
            "outline-variant": "#bfdbfe",
            "tertiary": "#8b5cf6",
            "tertiary-container": "#ede9fe",
            "error": "#ef4444"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Lexend"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
     .bg-geometric-pattern {
        background-color: #f0f8ff;
        background-image: radial-gradient(#bfdbfe 2px, transparent 2px);
        background-size: 32px 32px;
     }

     .float-anim {
        animation: floating 3s ease-in-out infinite;
     }
     @keyframes floating {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(2deg); }
        100% { transform: translateY(0px) rotate(0deg); }
     }

     /* Fix overlay hiding behind Tailwind */
     #feedback-overlay { z-index: 99999 !important; }
  </style>
</head>
<body class="bg-surface-bright text-on-surface font-body min-h-screen overflow-x-hidden bg-geometric-pattern">

  <!-- Header -->
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center px-4 py-3 shadow-[0_4px_30px_rgba(59,130,246,0.1)] border-b border-outline-variant/50">
    <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-surface-container border border-outline-variant shadow-sm text-on-surface hover:bg-surface-variant transition-colors">
        <span class="material-symbols-outlined">close</span>
    </a>
    <div class="flex-grow mx-4">
        <div class="w-full h-3 bg-surface-variant rounded-full overflow-hidden shadow-inner hidden lg:block">
            <div id="progress-fill" class="h-full bg-primary transition-all duration-300 shadow-[0_0_10px_rgba(59,130,246,0.8)]" style="width: 0%"></div>
        </div>
    </div>
    <div class="flex items-center gap-2 font-black text-lg bg-surface-container px-4 py-1.5 rounded-2xl shadow-sm border border-outline-variant text-on-surface">
        <span id="global-stopwatch" class="text-primary tracking-wider">⏱️ 0s</span>
    </div>
  </header>

  <!-- Game Shell -->
  <main class="pt-24 px-4 max-w-2xl mx-auto h-[100dvh] flex flex-col relative">

    <!-- Abstract Decorative Elements -->
    <div class="absolute -right-20 top-40 w-48 h-48 bg-secondary/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -left-10 top-20 w-32 h-32 bg-primary/10 rounded-full blur-2xl pointer-events-none"></div>
    
    <!-- Question Card -->
    <div class="bg-white/80 backdrop-blur-md rounded-[2rem] p-6 border border-white shadow-[0_20px_40px_rgba(59,130,246,0.1)] flex flex-col items-center flex-grow mb-[100px] relative z-10 w-full max-h-[80vh] overflow-y-auto" style="scrollbar-width: thin;">
        <h2 id="question-title" class="text-xl font-headline font-black text-center mb-4 text-on-surface">Carregando desafio...</h2>
        
        <!-- Grid Board -->
        <div id="grid-board" class="grid-board"></div>

        <!-- Input Area injected by Engine -->
        <div id="input-container" class="w-full"></div>
    </div>

    <!-- Sticky Action Button (Verificar) -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/60 backdrop-blur-xl border-t border-outline-variant/30 z-40 shadow-[0_-10px_30px_rgba(59,130,246,0.05)]">
        <div class="max-w-2xl mx-auto">
            <button id="check-btn" class="w-full bg-primary text-white font-black py-4 rounded-2xl text-xl shadow-[0_6px_0px_#1e3a8a] active:translate-y-[6px] active:shadow-[0_0px_0px_#1e3a8a] flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
                <span>VERIFICAR</span>
                <span class="material-symbols-outlined font-black">done_all</span>
            </button>
        </div>
    </div>

    <!-- Overlay Feedback (Tailwind Managed via JS Classes) -->
    <div id="feedback-overlay" class="feedback-overlay">
      <div id="feedback-msg" class="feedback-msg"></div>
    </div>

    <!-- Summary Screen Modal (Tailwind Styled) -->
    <div id="summary-screen" class="summary-screen"></div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const level = urlParams.get('level') || 1;
    const game = new GameEngine(level, database);
    game.init();

    document.getElementById('check-btn').addEventListener('click', () => {
        game.checkAnswer();
    });
  </script>
</body>
</html>
