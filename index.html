<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Grid Quest - Geometria Interativa</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#f0f8ff",
            "on-surface": "#1e3a8a",
            "primary": "#3b82f6",
            "primary-container": "#dbeafe",
            "on-primary-container": "#1e40af",
            "secondary": "#fbbf24",
            "secondary-container": "#fef3c7",
            "tertiary": "#8b5cf6",
            "tertiary-container": "#ede9fe",
            "surface-container": "#ffffff",
            "surface-variant": "#e0f2fe",
            "outline-variant": "#bfdbfe"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Lexend"],
            "label": ["Lexend"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }

    .bg-geometric-pattern {
      background-color: #f0f8ff;
      background-image: radial-gradient(#bfdbfe 2px, transparent 2px);
      background-size: 32px 32px;
    }

    .floating-shape {
      position: absolute;
      z-index: 0;
      opacity: 0.1;
      pointer-events: none;
    }

    .node-active {
      box-shadow: 0 8px 0px rgba(59, 130, 246, 0.4);
      transition: all 0.15s;
    }

    .node-active:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0px rgba(59, 130, 246, 0.4);
    }

    .float-anim {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(2deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }
  </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen pb-32 overflow-x-hidden bg-geometric-pattern">

  <!-- TopAppBar -->
  <header
    class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 py-4 shadow-[0_4px_30px_rgba(59,130,246,0.1)] border-b border-outline-variant/50">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-2xl bg-primary-container flex items-center justify-center overflow-hidden shadow-sm border border-outline-variant">
        <span class="material-symbols-outlined text-primary">school</span>
      </div>
      <div class="flex flex-col">
        <span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-widest font-label"
          id="user-level-label">Nível 1</span>
        <span class="font-headline font-black text-2xl text-primary">Grid Quest</span>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div
        class="flex items-center gap-1 font-black text-lg bg-surface-container px-3 py-1 rounded-2xl shadow-sm border border-outline-variant text-on-surface">
        <span>⭐</span> <span id="ui-score">0</span>
      </div>
      <button
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-container hover:bg-surface-variant transition-colors">
        <span class="material-symbols-outlined text-primary">settings</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-24 px-6 max-w-5xl mx-auto relative">

    <!-- Hero Section -->
    <section id="hero-section" class="mb-10 relative z-10 min-h-[75vh] flex items-center justify-center">
      <div
        class="bg-white rounded-[2.5rem] p-10 border border-white shadow-[0_20px_40px_rgba(59,130,246,0.2)] relative overflow-hidden group w-full text-center flex flex-col items-center">
        <div class="relative z-10 flex flex-col items-center">
          <span
            class="inline-block px-4 py-1 rounded-full bg-primary-container text-on-primary-container font-bold text-xs uppercase mb-4 tracking-widest shadow-sm">Unidade
            Atual</span>
          <h1 id="current-unit-title" class="font-headline text-5xl md:text-6xl font-black text-on-surface mb-4">Área
          </h1>
          <p class="text-primary text-xl md:text-2xl font-bold mb-2">Explore o espaço e domine o cálculo do plano.</p>
          <p class="text-on-surface/70 text-lg mb-10 max-w-md mx-auto">Sua jornada antigravitacional visual pelo mundo
            da área começa aqui!</p>

          <button id="main-play-btn"
            class="inline-flex items-center gap-3 bg-secondary text-white font-black px-12 py-6 rounded-2xl hover:scale-105 transition-transform shadow-[0_6px_0px_#d97706] active:translate-y-[6px] active:shadow-[0_0px_0px_#d97706] text-2xl">
            <span>JOGAR AGORA</span>
            <span class="material-symbols-outlined text-3xl">play_circle</span>
          </button>
        </div>

        <!-- Decoration -->
        <div
          class="absolute right-0 top-1/2 -translate-y-1/2 opacity-20 lg:opacity-100 pr-10 pointer-events-none float-anim">
          <div class="text-[120px] filter drop-shadow-xl">🦉</div>
          <div class="absolute -top-10 -left-10 w-16 h-16 bg-secondary/30 rounded-full blur-xl"></div>
          <div class="absolute -bottom-5 -right-5 w-20 h-20 bg-primary/20 rounded-xl rotate-12 blur-sm"></div>
        </div>
      </div>
    </section>

    <section id="trail-section" class="mb-12 hidden">

      <!-- Linear Trail Card -->
      <div
        class="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 border border-white shadow-[0_20px_40px_rgba(59,130,246,0.1)] w-full relative">
        <!-- Abstract Background Shape -->
        <div class="absolute inset-0 overflow-hidden rounded-[2.5rem] pointer-events-none">
          <div class="absolute -right-20 -top-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
          <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
        </div>
        <h3
          class="font-headline text-2xl font-black mb-8 flex items-center gap-3 justify-center text-on-surface relative z-10">
          <span class="material-symbols-outlined text-secondary">map</span>
        </h3>

        <div class="flex flex-col items-center gap-12 relative py-8" id="trail-nodes">
          <!-- Trail Connection Lines (Pure SVG) -->
          <svg class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-full -z-10 opacity-30" viewBox="0 0 100 400"
            preserveAspectRatio="none">
            <path d="M50,0 Q80,100 20,200 Q80,300 50,400" stroke="#3b82f6" stroke-width="4" fill="none"
              stroke-dasharray="8 8" stroke-linecap="round" />
          </svg>
          <!-- nodes injected by JS -->
        </div>
      </div>
    </section>

  </main>

  <script>
    // ── Configuração dos níveis disponíveis ──────────────────────────────────
    const LEVELS = [
      { id: 1, label: 'O Quadrado', emoji: '⬜', offset: '', delay: '0s' },
      { id: 2, label: 'O Ladrilhador', emoji: '🧱', offset: '-translate-x-12', delay: '1s' },
      { id: 3, label: 'Dimensão Real', emoji: '📐', offset: 'translate-x-16', delay: '2s' },
      { id: 4, label: 'Em breve...', emoji: '🔒', offset: '', delay: '3s' },
    ];

    // ── helpers de localStorage ──────────────────────────────────────────────
    function getUnlockedLevel() {
      return parseInt(localStorage.getItem('geomaster_unlocked_level')) || 1;
    }
    function getStars(levelId) {
      return parseInt(localStorage.getItem(`geomaster_stars_N${levelId}`)) || 0;
    }

    // ── Renderiza estrelinhas ────────────────────────────────────────────────
    function renderStars(count) {
      let html = '<div style="display:flex;gap:2px;justify-content:center;margin-top:6px;">';
      for (let i = 1; i <= 3; i++) {
        const filled = i <= count;
        html += `<span class="material-symbols-outlined" style="font-size:1.1rem;color:${filled ? '#facc15' : '#d1d5db'};font-variation-settings:'FILL' ${filled ? 1 : 0};">star</span>`;
      }
      html += '</div>';
      return html;
    }

    // ── Constrói os nós do mapa ──────────────────────────────────────────────
    function buildTrail() {
      const unlocked = getUnlockedLevel();
      const container = document.getElementById('trail-nodes');
      // Limpa nós antigos (mantém SVG)
      container.querySelectorAll('.trail-node-wrap').forEach(n => n.remove());

      LEVELS.forEach((lvl, idx) => {
        const isUnlocked = lvl.id <= unlocked;
        const isActive = lvl.id === unlocked; // última desbloqueada = destaque
        const starsEarned = getStars(lvl.id);
        const hasStars = starsEarned > 0;

        // Offset de ziguezague
        const offsets = ['', '-translate-x-12', 'translate-x-16', ''];
        const animDelay = lvl.delay || '0s';

        const wrap = document.createElement('div');
        wrap.className = `trail-node-wrap flex flex-col items-center ${offsets[idx]} float-anim`;
        wrap.style.animationDelay = animDelay;

        if (isUnlocked) {
          // ── NÓ ATIVO / CONCLUÍDO ──────────────────────────────────────────
          const isCurrentActive = isActive;
          const nodeClasses = isCurrentActive
            ? 'w-20 h-20 rounded-full bg-primary border-4 border-white flex items-center justify-center text-3xl font-black text-white node-active ring-8 ring-primary/20'
            : 'w-16 h-16 rounded-full bg-secondary-container border-4 border-white flex items-center justify-center text-2xl font-black node-active text-secondary';

          wrap.innerHTML = `
            <a href="game.html?level=${lvl.id}" class="${nodeClasses}">${lvl.id}</a>
            <span class="mt-3 font-bold text-xs bg-white text-on-surface px-4 py-2 rounded-2xl shadow-sm uppercase tracking-tighter border border-outline-variant/30">
              ${lvl.label}
            </span>
            ${hasStars ? renderStars(starsEarned) : ''}
          `;
        } else {
          // ── NÓ BLOQUEADO ──────────────────────────────────────────────────
          wrap.classList.add('opacity-40');
          wrap.innerHTML = `
            <div class="w-16 h-16 rounded-full bg-surface-variant border-4 border-white flex items-center justify-center text-2xl font-black text-outline-variant shadow-sm cursor-not-allowed">
              <span class="material-symbols-outlined">lock</span>
            </div>
            <span class="mt-3 font-bold text-xs bg-white/50 text-on-surface/40 px-4 py-2 rounded-2xl shadow-sm uppercase tracking-tighter border border-outline-variant/20">
              ${lvl.label}
            </span>
          `;
        }

        container.appendChild(wrap);
      });
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const score = localStorage.getItem('geomaster_score') || 0;
      document.getElementById('ui-score').innerText = score;

      const levelLabel = Math.floor(score / 50) + 1;
      document.getElementById('user-level-label').innerText = `Nível ${levelLabel}`;

      // Garante que o nível 1 está sempre disponível
      if (!localStorage.getItem('geomaster_unlocked_level')) {
        localStorage.setItem('geomaster_unlocked_level', '1');
      }

      buildTrail();

      // Revelar Trail ao clicar no botão
      const playBtn = document.getElementById('main-play-btn');
      const trailSection = document.getElementById('trail-section');
      const heroSection = document.getElementById('hero-section');

      playBtn.addEventListener('click', () => {
        heroSection.style.display = 'none';
        trailSection.classList.remove('hidden');
        window.scrollTo(0, 0);
      });
    });
  </script>
</body>

</html>
